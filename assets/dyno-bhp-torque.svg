    <line x1="150" y1="250" x2="150" y2="560"/><line x1="280" y1="250" x2="280" y2="560"/><line x1="410" y1="250" x2="410" y2="560"/>
    <line x1="540" y1="250" x2="540" y2="560"/><line x1="670" y1="250" x2="670" y2="560"/><line x1="800" y1="250" x2="800" y2="560"/>
    <line x1="930" y1="250" x2="930" y2="560"/><line x1="1060" y1="250" x2="1060" y2="560"/>
    <line x1="150" y1="560" x2="1060" y2="560"/><line x1="150" y1="500" x2="1060" y2="500"/><line x1="150" y1="440" x2="1060" y2="440"/>
    <line x1="150" y1="380" x2="1060" y2="380"/><line x1="150" y1="320" x2="1060" y2="320"/><line x1="150" y1="260" x2="1060" y2="260"/>
  </g>
  <g fill="#c9d4ea" font-size="18" font-family="Arial">
    <text x="102" y="566">2k</text><text x="232" y="566">3k</text><text x="362" y="566">4k</text><text x="492" y="566">5k</text>
    <text x="622" y="566">6k</text><text x="752" y="566">7k</text><text x="882" y="566">8k</text><text x="1008" y="566">9k</text>
