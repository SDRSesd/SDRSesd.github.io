  <path d="M150 545 C200 535, 230 520, 280 495 C330 470, 370 430, 410 392 C445 360, 495 330, 540 305 C590 282, 635 267, 670 258 C720 247, 770 245, 800 252 C850 264, 900 282, 930 300 C970 326, 1005 350, 1060 390" fill="none" stroke="url(#bhp)" stroke-width="7" filter="url(#glow)"/>
