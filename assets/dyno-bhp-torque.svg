  </g>
  <text x="560" y="620" fill="#96a7c8" font-size="20" font-family="Arial">Engine Speed (RPM)</text>
  <text x="35" y="420" fill="#96a7c8" font-size="20" font-family="Arial" transform="rotate(-90 35 420)">Power / Torque</text>
