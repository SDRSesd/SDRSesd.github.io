  <circle cx="960" cy="105" r="8" fill="#ff7a6d"/><text x="980" y="112" fill="#f3f7ff" font-size="22" font-family="Arial">Torque</text>
  <g>
    <circle cx="790" cy="248" r="7" fill="#6dffe0"/><line x1="790" y1="248" x2="900" y2="210" stroke="#6dffe0" stroke-width="2"/>
    <rect x="900" y="178" width="160" height="48" rx="12" fill="#0e1a30" stroke="rgba(109,255,224,0.35)"/>
    <text x="918" y="207" fill="#6dffe0" font-size="18" font-family="Arial" font-weight="700">Peak BHP • 418</text>
    <circle cx="515" cy="246" r="7" fill="#ff8575"/><line x1="515" y1="246" x2="390" y2="215" stroke="#ff8575" stroke-width="2"/>
    <rect x="190" y="183" width="190" height="48" rx="12" fill="#0e1a30" stroke="rgba(255,122,109,0.35)"/>
    <text x="208" y="212" fill="#ff9f90" font-size="18" font-family="Arial" font-weight="700">Peak Torque • 520 Nm</text>
