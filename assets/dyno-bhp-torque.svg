<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0d1a31"/>
    </linearGradient>
    <linearGradient id="bhp" x1="0" x2="1">
      <stop offset="0%" stop-color="#6dffe0"/>
      <stop offset="100%" stop-color="#8daeff"/>
    </linearGradient>
    <linearGradient id="tq" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffb36d"/>
      <stop offset="100%" stop-color="#ff5f5f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <text x="70" y="80" fill="#6dffe0" font-size="28" font-family="Arial" font-weight="700" letter-spacing="2">ICE TURBO DYNO RUN</text>
  <text x="70" y="125" fill="#f3f7ff" font-size="56" font-family="Arial" font-weight="700">BHP &amp; Torque Curve</text>
  <text x="70" y="165" fill="#96a7c8" font-size="22" font-family="Arial">Performance calibration overview • boost onset • mid-range torque • top-end power</text>
  <rect x="70" y="205" width="1060" height="390" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)"/>
