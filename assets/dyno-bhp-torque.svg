  <g>
    <rect x="70" y="640" width="180" height="34" rx="16" fill="#101d34" stroke="rgba(255,255,255,0.12)"/><text x="94" y="662" fill="#c9d4ea" font-size="16" font-family="Arial">Throttle mapping</text>
    <rect x="265" y="640" width="160" height="34" rx="16" fill="#101d34" stroke="rgba(255,255,255,0.12)"/><text x="298" y="662" fill="#c9d4ea" font-size="16" font-family="Arial">Boost onset</text>
    <rect x="440" y="640" width="198" height="34" rx="16" fill="#101d34" stroke="rgba(255,255,255,0.12)"/><text x="468" y="662" fill="#c9d4ea" font-size="16" font-family="Arial">Rev-match response</text>
  </g>
